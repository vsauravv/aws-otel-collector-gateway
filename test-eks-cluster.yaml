apiVersion: eksctl.io/v1alpha5
kind: ClusterConfig
metadata:
  name: vivek-aws-otel-test
  region: ap-south-1
  version: "1.31"
availabilityZones: ["ap-south-1a", "ap-south-1b", "ap-south-1c"]
iam:
  withOIDC: true
managedNodeGroups:
  - name: ng-1
    instanceType: m5.large
    minSize: 2
    maxSize: 4
    desiredCapacity: 3
    availabilityZones: ["ap-south-1a", "ap-south-1b"]
    privateNetworking: true
   