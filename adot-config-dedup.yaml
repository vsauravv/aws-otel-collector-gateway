
apiVersion: v1
kind: ConfigMap
metadata:
  name: adot-collector-config
  namespace: monitoring
data:
  collector.yaml: |
    receivers:
      prometheus:
        config:
          scrape_configs:
          - job_name: 'yace-cloudwatch'
            scrape_interval: 60s
            static_configs:
            - targets: ['yace-service.monitoring.svc.cluster.local:5000']
            metric_relabel_configs:
            - source_labels: [__name__]
              regex: 'aws_.*'
              action: keep

    processors:
      batch:
      # Add replica label for deduplication
      attributes:
        actions:
        - key: replica
          value: ${env:HOSTNAME}
          action: upsert

    extensions:
      sigv4auth:
        region: ap-south-1
        service: "aps"

    exporters:
      prometheusremotewrite:
        endpoint: "https://aps-workspaces.ap-south-1.amazonaws.com/workspaces/ws-545645c3-1ceb-4f7b-9c92-ad8ffd357af7/api/v1/remote_write"
        auth:
          authenticator: sigv4auth

    service:
      extensions: [sigv4auth]
      pipelines:
        metrics:
          receivers: [prometheus]
          processors: [batch, attributes]
          exporters: [prometheusremotewrite]