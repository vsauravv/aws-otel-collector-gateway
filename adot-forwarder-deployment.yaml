apiVersion: apps/v1
kind: Deployment
metadata:
  name: adot-forwarder
  namespace: monitoring
spec:
  replicas: 2   # 2 replicas for HA
  selector:
    matchLabels:
      app: adot-forwarder
  template:
    metadata:
      labels:
        app: adot-forwarder
    spec:
      serviceAccountName: adot-sa
      containers:
      - name: adot
        image: public.ecr.aws/aws-observability/aws-otel-collector:latest
        args:
        - --config=/conf/collector.yaml
        ports:
        - containerPort: 8888   # health check
        volumeMounts:
        - name: config
          mountPath: /conf
      volumes:
      - name: config
        configMap:
          name: adot-forwarder-config