apiVersion: v1
kind: ConfigMap
metadata:
  name: yace-config
  namespace: monitoring
data:
  config.yaml: |
    apiVersion: v1alpha1
    discovery:
      jobs:
        - type: AWS/S3
          regions: ["us-west-1", "ap-south-1"]
          searchTags:
            - key: Environment
              value: test_poc
            - key: env
              value: test
          metrics:
            - name: AllRequests
              statistics: ["Average", "Maximum", "Minimum", "Sum"]
              period: 60
              length: 300

            - name: BucketSizeBytes
              statistics: ["Average"]
              period: 86400
              length: 172800
              nilToZero: true
              
            - name: NumberOfObjects
              statistics: ["Average"]
              period: 86400
              length: 172800
              nilToZero: true
              
        - type: AWS/EC2
          regions: ["ap-south-1"]
          statistics: ["Average", "Maximum", "Minimum"]
          period: 300
          length: 1800
          nilToZero: true
          delay: 300
          metrics:
            - name: CPUUtilization
            - name: NetworkIn
            - name: NetworkOut
            - name: DiskReadBytes
            - name: DiskWriteBytes

        - type: AWS/EKS
          regions: ["ap-south-1"]
          statistics: ["Average", "Maximum", "Minimum", "Sum"]
          period: 300
          length: 1800
          nilToZero: true
          delay: 300
          metrics:
            - name: cluster_failed_node_count
            - name: cluster_node_count
            - name: apiserver_request_rate
            - name: apiserver_request_duration_seconds
            - name: etcd_request_duration_seconds
            - name: scheduler_pending_pods
            - name: controller_manager_queue_depth

        - type: AWS/ElastiCache
          regions: ["ap-south-1"]
          searchTags:
            - key: env
              value: otel-test
          metrics:
            - name: CPUUtilization
              statistics: ["Average"]
              period: 300
              length: 1800
              nilToZero: true
              delay: 300
            - name: CurrConnections
              statistics: ["Average"]
              period: 300
              length: 1800
              nilToZero: true
              delay: 300
            - name: BytesUsedForCache
              statistics: ["Average"]
              period: 300
              length: 1800
              nilToZero: true
              delay: 300
            - name: Evictions
              statistics: ["Average"]
              period: 300
              length: 1800
              nilToZero: true
              delay: 300
            - name: GetTypeCmds
              statistics: ["Average"]
              period: 300
              length: 1800
              nilToZero: true
              delay: 300
            - name: SetTypeCmds
              statistics: ["Average"]
              period: 300
              length: 1800
              nilToZero: true
              delay: 300
            - name: SuccessfulReadRequestLatency
              statistics: ["Average"]
              period: 300
              length: 1800
              nilToZero: true
              delay: 300
            - name: SuccessfulWriteRequestLatency
              statistics: ["Average"]
              period: 300
              length: 1800
              nilToZero: true
              delay: 300
            - name: NetworkBytesIn
              statistics: ["Average"]
              period: 300
              length: 1800
              nilToZero: true
              delay: 300
            - name: NetworkBytesOut
              statistics: ["Average"]
              period: 300
              length: 1800
              nilToZero: true
              delay: 300
            - name: ReplicationLag
              statistics: ["Average"]
              period: 300
              length: 1800
              nilToZero: true
              delay: 300
            - name: EngineCPUUtilization
              statistics: ["Average"]
              period: 300
              length: 1800
              nilToZero: true
              delay: 300

        - type: AWS/RDS
          regions: ["ap-south-1"]
          searchTags:
            - key: env
              value: test
          metrics:
            - name: CPUUtilization
              statistics: ["Average", "Maximum", "Minimum", "Sum"]
              period: 300
              length: 1800
            - name: DatabaseConnections
              statistics: ["Average", "Maximum", "Minimum", "Sum"]
              period: 300
              length: 1800
            - name: FreeableMemory
              statistics: ["Average", "Maximum", "Minimum", "Sum"]
              period: 300
              length: 1800
            - name: FreeStorageSpace
              statistics: ["Average", "Maximum", "Minimum", "Sum"]
              period: 300
              length: 1800
            - name: ReadIOPS
              statistics: ["Average", "Maximum", "Minimum", "Sum"]
              period: 300
              length: 1800
            - name: WriteIOPS
              statistics: ["Average", "Maximum", "Minimum", "Sum"]
              period: 300
              length: 1800
            - name: ReadLatency
              statistics: ["Average", "Maximum", "Minimum", "Sum"]
              period: 300
              length: 1800
            - name: WriteLatency
              statistics: ["Average", "Maximum", "Minimum", "Sum"]
              period: 300
              length: 1800
            - name: DiskQueueDepth
              statistics: ["Average", "Maximum", "Minimum", "Sum"]
              period: 300
              length: 1800

        # - type: AWS/ApplicationELB
        #   regions: ["ap-south-1"]
        #   statistics: ["Average", "Sum"]
        #   period: 60
        #   length: 1200
        #   nilToZero: true
        #   delay: 60
        #   metrics:
        #     - name: RequestCount
        #     - name: NewConnectionCount
        #     - name: HealthyHostCount
        #     - name: UnHealthyHostCount
        #     - name: TargetResponseTime
        #     - name: HTTPCode_ELB_5XX_Count

        # - type: AWS/NetworkELB
        #   regions: ["ap-south-1"]
        #   statistics: ["Average", "Sum"]
        #   period: 60
        #   length: 900
        #   nilToZero: true
        #   delay: 120
        #   metrics:
        #     - name: ActiveFlowCount
        #     - name: NewFlowCount
        #     - name: ProcessedBytes