
apiVersion: v1
kind: ConfigMap
metadata:
  name: yace-config
  namespace: monitoring
data:
  config.yaml: |
    apiVersion: v1alpha1
    discovery:
      jobs:
        - type: AWS/EC2
          regions: ["ap-south-1"]
          searchTags: []                    # Empty = no filtering, sab EC2 le lega (including EKS nodes)
          statistics: ["Average", "Maximum", "Minimum"]
          period: 300
          length: 1800
          nilToZero: true
          delay: 300
          metrics:
            - name: CPUUtilization
            - name: NetworkIn
            - name: NetworkOut
            - name: DiskReadBytes
            - name: DiskWriteBytes
            - name: StatusCheckFailed

        cat > yace-config-full.yaml << 'EOF'
apiVersion: v1
kind: ConfigMap
metadata:
  name: yace-config
  namespace: monitoring
data:
  config.yaml: |
    apiVersion: v1alpha1
    discovery:
      jobs:
        - type: AWS/EC2
          regions: ["ap-south-1"]
          searchTags: []
          statistics: ["Average", "Maximum", "Minimum"]
          period: 300
          length: 1800
          nilToZero: true
          delay: 300
          metrics:
            - name: CPUUtilization
            - name: NetworkIn
            - name: NetworkOut
            - name: DiskReadBytes
            - name: DiskWriteBytes

        - type: AWS/S3
          regions: ["ap-south-1"]
          searchTags: []
          statistics: ["Average"]
          period: 86400     # 24 hours
          length: 172800    # 48 hours
          nilToZero: true
          delay: 300
          metrics:
            - name: BucketSizeBytes
            - name: NumberOfObjects

        - type: AWS/ElastiCache
          regions: ["ap-south-1"]
          searchTags: []
          statistics: ["Average"]
          period: 300
          length: 1800
          nilToZero: true
          delay: 300
          metrics:
            - name: CPUUtilization
            - name: CurrConnections

        - type: AWS/RDS
          regions: ["ap-south-1"]
          searchTags: []
          statistics: ["Average"]
          period: 300
          length: 1800
          nilToZero: true
          delay: 300
          metrics:
            - name: CPUUtilization
            - name: DatabaseConnections
            - name: FreeableMemory
            - name: FreeStorageSpace

        - type: AWS/ApplicationELB
          regions: ["ap-south-1"]
          searchTags: []
          statistics: ["Average", "Sum"]
          period: 300
          length: 1800
          nilToZero: true
          delay: 300
          metrics:
            - name: RequestCount
            - name: HealthyHostCount
            - name: UnHealthyHostCount
            - name: TargetResponseTime

        - type: AWS/NetworkELB
          regions: ["ap-south-1"]
          searchTags: []
          statistics: ["Average", "Sum"]
          period: 300
          length: 1800
          nilToZero: true
          delay: 300
          metrics:
            - name: ActiveFlowCount
            - name: NewFlowCount