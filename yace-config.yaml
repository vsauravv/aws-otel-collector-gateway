apiVersion: v1
kind: ConfigMap
metadata:
  name: yace-config
  namespace: monitoring
data:
  config.yaml: |
    apiVersion: v1alpha1
    discovery:
      jobs:
        - type: AWS/EC2
          regions: ["ap-south-1"]
          statistics: ["Average", "Maximum", "Minimum"]
          period: 300
          length: 1800
          nilToZero: true
          delay: 300
          metrics:
            - name: CPUUtilization
            - name: NetworkIn
            - name: NetworkOut
            - name: DiskReadBytes
            - name: DiskWriteBytes

        - type: AWS/EKS
          regions: ["ap-south-1"]
          statistics: ["Average", "Maximum", "Minimum", "Sum"]
          period: 300
          length: 1800
          nilToZero: true
          delay: 300
          metrics:
            - name: cluster_failed_node_count
            - name: cluster_node_count
            - name: apiserver_request_rate
            - name: apiserver_request_duration_seconds
            - name: etcd_request_duration_seconds
            - name: scheduler_pending_pods
            - name: controller_manager_queue_depth

        - type: AWS/S3
          regions: ["ap-south-1"]
          statistics: ["Average"]
          period: 86400     # 24 hours
          length: 172800    # 48 hours
          nilToZero: true
          delay: 300
          metrics:
            - name: BucketSizeBytes
            - name: NumberOfObjects

        - type: AWS/ElastiCache
          regions: ["ap-south-1"]
          statistics: ["Average"]
          period: 300
          length: 1800
          nilToZero: true
          delay: 300
          metrics:
            - name: CPUUtilization
            - name: CurrConnections

        - type: AWS/RDS
          regions: ["ap-south-1"]
          statistics: ["Average"]
          period: 300
          length: 1800
          nilToZero: true
          delay: 300
          metrics:
            - name: CPUUtilization
            - name: DatabaseConnections
            - name: FreeableMemory
            - name: FreeStorageSpace

        - type: AWS/ApplicationELB
          regions: ["ap-south-1"]
          statistics: ["Average", "Sum"]
          period: 60
          length: 1200
          nilToZero: true
          delay: 60
          metrics:
            - name: RequestCount
            - name: NewConnectionCount
            - name: HealthyHostCount
            - name: UnHealthyHostCount
            - name: TargetResponseTime
            - name: HTTPCode_ELB_5XX_Count

        - type: AWS/NetworkELB
          regions: ["ap-south-1"]
          statistics: ["Average", "Sum"]
          period: 60
          length: 900
          nilToZero: true
          delay: 120
          metrics:
            - name: ActiveFlowCount
            - name: NewFlowCount
            - name: ProcessedBytes