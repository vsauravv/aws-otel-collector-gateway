
apiVersion: v1
kind: ConfigMap
metadata:
  name: yace-config
  namespace: monitoring
data:
  config.yaml: |
    apiVersion: v1alpha1
    discovery:
      jobs:
        - type: AWS/EC2
          regions: ["ap-south-1"]
          searchTags:
            - key: env
              value: monitoring
          statistics: ["Average", "Maximum", "Minimum"]
          period: 300
          length: 1200
          nilToZero: true
          delay: 180
          metrics:
            - name: CPUUtilization
            - name: NetworkIn
            - name: NetworkOut
            - name: DiskReadBytes
            - name: DiskWriteBytes

