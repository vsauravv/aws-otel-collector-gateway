apiVersion: v1
kind: ConfigMap
metadata:
  name: yace-config
  namespace: monitoring
data:
  config.yaml: |
    apiVersion: v1alpha1
    # static:
    #   - namespace: AWS/S3
    #     regions:
    #       - us-east-1
    #     name: vivek-otel-aws-test
    #     metrics:
    #       - name: BucketSizeBytes
    #         statistics: ["Average"]
    #         period: 86400
    #         length: 172800
    #         nilToZero: true

    #       - name: NumberOfObjects
    #         statistics: ["Average"]
    #         period: 86400
    #         length: 172800
    #         nilToZero: true
      
    discovery:
      jobs:
        - type: AWS/S3
          regions: [us-west-1]
          metrics:
            - name: AllRequests
              statistics: ["Average", "Maximum", "Minimum", "Sum"]
              period: 60
              length: 300
            - name: BucketSizeBytes
              statistics: ["Average", "Maximum", "Minimum", "Sum"]
              period: 86400
              length: 172800
              nilToZero: true
              addCloudwatchTimestamp: true
            - name: NumberOfObjects
              statistics: ["Average", "Maximum", "Minimum", "Sum"]
              period: 86400
              length: 172800
              nilToZero: true
              
        - type: AWS/EC2
          regions: ["ap-south-1"]
          statistics: ["Average", "Maximum", "Minimum"]
          period: 300
          length: 1800
          nilToZero: true
          delay: 300
          metrics:
            - name: CPUUtilization
            - name: NetworkIn
            - name: NetworkOut
            - name: DiskReadBytes
            - name: DiskWriteBytes

        - type: AWS/EKS
          regions: ["ap-south-1"]
          statistics: ["Average", "Maximum", "Minimum", "Sum"]
          period: 300
          length: 1800
          nilToZero: true
          delay: 300
          metrics:
            - name: cluster_failed_node_count
            - name: cluster_node_count
            - name: apiserver_request_rate
            - name: apiserver_request_duration_seconds
            - name: etcd_request_duration_seconds
            - name: scheduler_pending_pods
            - name: controller_manager_queue_depth

        # - type: AWS/ElastiCache
        #   regions: ["ap-south-1"]
        #   statistics: ["Average"]
        #   period: 300
        #   length: 1800
        #   nilToZero: true
        #   delay: 300
        #   metrics:
        #     - name: CPUUtilization
        #     - name: CurrConnections
        #     - name: BytesUsedForCache
        #     - name: Evictions
        #     - name: GetTypeCmds
        #     - name: SetTypeCmds
        #     - name: SuccessfulReadRequestLatency
        #     - name: SuccessfulWriteRequestLatency
        #     - name: NetworkBytesIn
        #     - name: NetworkBytesOut
        #     - name: ReplicationLag
        #     - name: EngineCPUUtilization

        - type: AWS/RDS
          regions: ["ap-south-1"]
          statistics: ["Average", "Maximum", "Minimum", "Sum"]
          period: 300
          length: 1800
          nilToZero: true
          delay: 300
          searchTags:
            - key: '.*'
              value: '.*'
          metrics:
            - name: CPUUtilization
            - name: DatabaseConnections
            - name: FreeableMemory
            - name: FreeStorageSpace
            - name: ReadIOPS
            - name: WriteIOPS
            - name: ReadLatency
            - name: WriteLatency
            - name: DiskQueueDepth

        # - type: AWS/ApplicationELB
        #   regions: ["ap-south-1"]
        #   statistics: ["Average", "Sum"]
        #   period: 60
        #   length: 1200
        #   nilToZero: true
        #   delay: 60
        #   metrics:
        #     - name: RequestCount
        #     - name: NewConnectionCount
        #     - name: HealthyHostCount
