apiVersion: v1
kind: ConfigMap
metadata:
  name: adot-forwarder-config
  namespace: monitoring
data:
  collector.yaml: |
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318

    processors:
      batch:


    exporters:
      otlphttp/newrelic:
        endpoint: https://otlp.nr-data.net:443
        headers:
          api-key: 64d352987aac450f026acd1c809cef47c1beNRAL

    service:
      pipelines:
        metrics:
          receivers: [otlp]
          processors: [batch]
          exporters: [otlphttp/newrelic]