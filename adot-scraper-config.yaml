apiVersion: v1
kind: ConfigMap
metadata:
  name: adot-scraper-config
  namespace: monitoring
data:
  collector.yaml: |
    receivers:
      prometheus:
        config:
          scrape_configs:
          - job_name: 'aws-cloudwatch-otel'
            scrape_interval: 60s
            static_configs:
            - targets: ['yace-service.monitoring.svc.cluster.local:5000']

    processors:
      batch:


    exporters:
      otlp:
        endpoint: adot-forwarder:4317
        tls:
          insecure: true

    service:
      pipelines:
        metrics:
          receivers: [prometheus]
          processors: [batch]
          exporters: [otlp]